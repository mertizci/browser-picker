name: Release

# Triggered whenever you publish a GitHub Release (tag like v1.2.3).
# It builds, signs (Developer ID), notarizes, staples, attaches the ZIP to the
# release, and bumps the Homebrew cask in mertizci/homebrew-tap automatically.
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          XCODE="$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)"
          XCODE="${XCODE:-/Applications/Xcode.app}"
          echo "Using $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -version

      - name: Install build tools
        run: brew install xcodegen create-dmg

      - name: Import Developer ID certificate
        env:
          CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          CERT_PATH="$RUNNER_TEMP/developer_id.p12"

          echo "$CERT_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERT_PASSWORD" -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # Make our keychain searchable alongside the defaults.
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | sed 's/"//g')
          rm -f "$CERT_PATH"

      - name: Build, sign, notarize & package
        id: release
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          scripts/release.sh "$VERSION"

      - name: Attach ZIP + DMG to the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$GITHUB_REF_NAME" \
            "${{ steps.release.outputs.zip_path }}" \
            "${{ steps.release.outputs.dmg_path }}" --clobber

      - name: Bump Homebrew cask in tap
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          VERSION: ${{ steps.release.outputs.version }}
          SHA256: ${{ steps.release.outputs.sha256 }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${GH_TOKEN}@github.com/mertizci/homebrew-tap.git" tap
          cd tap
          sed -i '' "s/^  version \".*\"/  version \"$VERSION\"/" Casks/browser-picker.rb
          sed -i '' "s/^  sha256 \".*\"/  sha256 \"$SHA256\"/" Casks/browser-picker.rb
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "Cask already up to date."
          else
            git add Casks/browser-picker.rb
            git commit -m "browser-picker $VERSION"
            git push
          fi
